  <!-- Right ear cup -->
  <circle cx="150" cy="80" r="25" fill="none" stroke="currentColor" stroke-width="8"/>
  <!-- Headband left side -->
  <path d="M 75 60 Q 75 30 100 25 Q 125 30 125 60" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
  <!-- Headband right side -->
  <path d="M 75 60 Q 75 30 100 25 Q 125 30 125 60" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
  <!-- Left connector -->
